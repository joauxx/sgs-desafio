<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGS</title>
    <!-- Bootstrap CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .bg-brand {
            background-color: #2563eb !important;
            color: white;
        }

        .bg-brand:hover {
            background-color: #1d4ed8 !important;
            color: white;
        }

        .text-brand {
            color: #2563eb !important;
        }

        .toast-container-custom {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1055;
        }
    </style>
</head>

<body>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container-custom d-flex flex-column gap-2"></div>

    <!-- Header / Navbar -->
    <nav class="navbar navbar-light bg-white border-bottom sticky-top py-3">
        <div class="container-xl d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2">
                <h1 class="h5 mb-0 fw-bold text-dark">Solicitações</h1>
            </div>
            <button onclick="openModal('modal-nova-solicitacao')"
                class="btn bg-brand btn-sm d-flex align-items-center gap-2 shadow-sm fw-medium px-3 py-2">
                <i class="ph ph-plus fs-5"></i>
                Nova solicitação
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container-xl py-4">

        <!-- Filtros Form -->
        <section class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <form id="filter-form" class="row g-3 align-items-end">
                    <div class="col-md-2" style="width: 12.5%;">
                        <label class="form-label text-muted small fw-medium mb-1">Status</label>
                        <select name="status" class="form-select form-select-sm">
                            <option value="">Todos</option>
                            <option value="SOLICITADO">Solicitado</option>
                            <option value="LIBERADO">Liberado</option>
                            <option value="APROVADO">Aprovado</option>
                            <option value="REJEITADO">Rejeitado</option>
                            <option value="CANCELADO">Cancelado</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label text-muted small fw-medium mb-1">Categoria</label>
                        <select name="categoriaId" id="filter-categoria" class="form-select form-select-sm">
                            <option value="">Todas</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label text-muted small fw-medium mb-1">Data Inicial</label>
                        <input type="date" name="dataInicio" class="form-control form-control-sm">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label text-muted small fw-medium mb-1">Data Final</label>
                        <input type="date" name="dataFim" class="form-control form-control-sm">
                    </div>
                    <div class="col-md-2" style="width: 20.833%;">
                        <label class="form-label text-muted small fw-medium mb-1">Ordenação</label>
                        <select name="sort" class="form-select form-select-sm">
                            <option value="sol.nome,asc" selected>Padrão (Solicitante: A-Z)</option>
                            <option value="valor,asc">Valor: Menor para Maior</option>
                            <option value="valor,desc">Valor: Maior para Menor</option>
                            <option value="data_solicitacao,desc">Data: Mais Recente</option>
                            <option value="data_solicitacao,asc">Data: Mais Antiga</option>
                            <option value="cat.nome,asc">Categoria: A-Z</option>
                            <option value="status,asc">Status: A-Z</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex gap-2">
                        <button type="button" id="btn-limpar-filtros"
                            class="btn btn-outline-secondary w-100 btn-sm fw-medium py-1">
                            Limpar
                        </button>
                        <button type="submit" class="btn btn-light border w-100 btn-sm text-secondary fw-medium py-1">
                            Filtrar
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <!-- Tabela -->
        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="table-responsive mb-0">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light text-muted small text-uppercase">
                        <tr>
                            <th scope="col" class="py-3 px-4 border-bottom-0">Solicitante</th>
                            <th scope="col" class="py-3 px-4 border-bottom-0">Categoria</th>
                            <th scope="col" class="py-3 px-4 border-bottom-0">Valor</th>
                            <th scope="col" class="py-3 px-4 border-bottom-0">Status</th>
                            <th scope="col" class="py-3 px-4 border-bottom-0 text-end">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="bg-white border-top-0">
                        <!-- Renderizado via JS -->
                    </tbody>
                </table>
            </div>

            <!-- Loading State -->
            <div id="table-loading" class="d-none p-5 text-center text-muted">
                <div class="spinner-border text-brand mb-3" style="width: 3rem; height: 3rem;" role="status">
                    <span class="visually-hidden">Carregando...</span>
                </div>
                <h6 class="fw-bold text-dark mb-1">Carregando solicitações...</h6>
                <p class="small">Por favor, aguarde um momento.</p>
            </div>

            <!-- Empty State -->
            <div id="table-empty" class="d-none p-5 text-center text-muted">
                <i class="ph ph-tray display-4 text-light mb-3"></i>
                <h6 class="fw-bold text-dark mb-1">Nenhuma solicitação encontrada</h6>
                <p class="small">Tente ajustar os filtros ou crie uma nova solicitação.</p>
            </div>
        </div>

    </main>

    <!-- Modal Nova Solicitação -->
    <div class="modal fade" id="modal-nova-solicitacao" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold">Nova Solicitação</h5>
                    <button type="button" class="btn-close" onclick="closeModal('modal-nova-solicitacao')"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="form-nova-solicitacao">
                        <div class="mb-3">
                            <label class="form-label fw-medium small mb-1">Solicitante</label>
                            <select id="input-solicitante" required class="form-select form-select-sm">
                                <option value="">Selecione...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium small mb-1">Categoria</label>
                            <select id="input-categoria" required class="form-select form-select-sm">
                                <option value="">Selecione...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium small mb-1">Valor (R$)</label>
                            <input type="number" id="input-valor" step="0.01" min="0.01" required
                                class="form-control form-control-sm" placeholder="0.00">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-medium small mb-1">Descrição</label>
                            <textarea id="input-descricao" rows="3" required class="form-control form-control-sm"
                                placeholder="Detalhes da solicitação..."></textarea>
                        </div>
                        <div class="d-flex justify-content-end gap-2 border-top pt-3">
                            <button type="button" onclick="closeModal('modal-nova-solicitacao')"
                                class="btn btn-light border btn-sm fw-medium px-3">Cancelar</button>
                            <button type="submit" class="btn bg-brand btn-sm fw-medium px-4">Criar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Detalhes -->
    <div class="modal fade" id="modal-detalhes" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold">Detalhes da Solicitação</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-medium small text-muted mb-0">Solicitante</label>
                        <div id="detalhe-solicitante-nome" class="fw-bold text-dark"></div>
                        <div id="detalhe-solicitante-doc" class="small text-muted"></div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-6">
                            <label class="form-label fw-medium small text-muted mb-0">Categoria</label>
                            <div id="detalhe-categoria" class="fw-medium text-dark"></div>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-medium small text-muted mb-0">Data da Solicitação</label>
                            <div id="detalhe-data" class="fw-medium text-dark"></div>
                        </div>
                    </div>
                    <div class="row mb-3 align-items-center">
                        <div class="col-6">
                            <label class="form-label fw-medium small text-muted mb-0">Valor</label>
                            <div id="detalhe-valor" class="fw-bold fs-5 text-brand"></div>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-medium small text-muted mb-0 d-block">Status</label>
                            <div id="detalhe-status"></div>
                        </div>
                    </div>
                    <div class="mb-2">
                        <label class="form-label fw-medium small text-muted mb-1">Descrição</label>
                        <div id="detalhe-descricao" class="bg-light border p-3 rounded small text-dark"
                            style="white-space: pre-wrap;"></div>
                    </div>
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-light border btn-sm fw-medium px-4 w-100"
                        data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Scripts -->
    <script src="api.js"></script>
    <script src="app.js"></script>
</body>

</html>
