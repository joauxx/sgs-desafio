spring.application.name=sgs

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sgs_db}
spring.datasource.username=${DB_USER:sgs_user}
spring.datasource.password=${DB_PASS:sgs_pass}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

spring.jpa.open-in-view=false
