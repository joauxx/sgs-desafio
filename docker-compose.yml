version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sgs_postgres
    environment:
      POSTGRES_DB: sgs_db
      POSTGRES_USER: sgs_user
      POSTGRES_PASSWORD: sgs_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
